name: Trigger hotspots.dev deploy

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy to hotspots-cloud
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HOTSPOTS_CLOUD_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Stephen-Collins-tech/hotspots-cloud/dispatches \
            -d '{"event_type":"content-updated"}'
